<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MyExpense - Rekod Belanja</title>
    <meta name="theme-color" content="#4f46e5">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --indigo: #4f46e5; --indigo-light: #818cf8; --indigo-dark: #3730a3; --indigo-bg: #eef2ff;
            --red: #ef4444; --red-bg: #fef2f2; --green: #10b981; --green-bg: #ecfdf5;
            --amber: #f59e0b; --amber-bg: #fffbeb; --blue: #3b82f6; --blue-bg: #eff6ff;
            --purple: #8b5cf6; --purple-bg: #f5f3ff; --pink: #ec4899; --pink-bg: #fdf2f8;
            --surface: #ffffff; --surface-alt: #f8fafc; --text: #0f172a; --text-secondary: #64748b;
            --text-muted: #94a3b8; --border: #e2e8f0; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 24px rgba(79,70,229,0.08); --shadow-lg: 0 8px 40px rgba(79,70,229,0.12);
            --radius: 16px; --radius-sm: 10px; --radius-xs: 6px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 720px; --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --indigo-bg: #0f0f1a; --surface: #1a1a2e; --surface-alt: #16162a; --text: #e2e8f0;
                --text-secondary: #94a3b8; --text-muted: #64748b; --border: #2d2d44;
                --shadow: 0 4px 24px rgba(0,0,0,0.4); --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
                --red-bg: rgba(239,68,68,0.08); --green-bg: rgba(16,185,129,0.08);
            }
        }
        body { font-family: var(--font); background: var(--indigo-bg); color: var(--text); padding-bottom: 90px; min-height: 100vh; }
        .offline-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: var(--red); color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; transform: translateY(-100%); transition: transform var(--transition); }
        .offline-banner.show { transform: translateY(0); }
        .sync-status { position: fixed; bottom: 90px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 600; color: var(--text-muted); box-shadow: var(--shadow-sm); z-index: 40; display: flex; align-items: center; gap: 6px; }
        .sync-status.synced { color: var(--green); border-color: var(--green); }
        .sync-status.syncing { color: var(--amber); border-color: var(--amber); }
        .sync-status.error { color: var(--red); border-color: var(--red); }
        .header { background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-dark) 100%); color: white; padding: 40px 20px 32px; text-align: center; }
        .header-inner { max-width: var(--max-width); margin: 0 auto; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-brand h1 { font-size: 20px; font-weight: 700; }
        .month-selector { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: var(--radius-sm); }
        .month-selector button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; width: 28px; }
        .month-selector span { font-size: 14px; font-weight: 600; min-width: 90px; }
        .total-section { margin-top: 10px; }
        .total-section .amount { font-size: 36px; font-weight: 800; }
        .main { max-width: var(--max-width); margin: 0 auto; padding: 20px 16px; }
        
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        @media (max-width: 480px) { .category-grid { grid-template-columns: 1fr; } }
        .cat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--border); }
        .cat-card .cat-top { display: flex; justify-content: space-between; align-items: center; }
        .cat-card .cat-name { font-size: 13px; font-weight: 600; }
        .cat-card .cat-total { font-size: 15px; font-weight: 700; }
        .cat-card .cat-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .cat-card .cat-bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }
        
        .entry-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .entry-item { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .entry-item .e-info { display: flex; flex-direction: column; }
        .entry-item .e-cat { font-size: 13px; font-weight: 600; }
        .entry-item .e-note { font-size: 12px; color: var(--text-secondary); }
        .entry-item .e-date { font-size: 11px; color: var(--text-muted); }
        .entry-item .e-right { display: flex; align-items: center; gap: 12px; }
        .entry-item .e-amount { font-size: 14px; font-weight: 700; }
        .entry-item .e-delete { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 4px; }
        .entry-empty { text-align: center; padding: 40px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border); }
        
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--indigo); color: white; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(79,70,229,0.4); z-index: 50; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 420px; padding: 24px; }
        
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
        .form-group select, .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-xs); background: var(--surface-alt); color: var(--text); outline: none; font-size: 14px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: var(--radius-xs); font-size: 14px; font-weight: 600; cursor: pointer; }
        .modal-actions .btn-cancel { background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-secondary); }
        .modal-actions .btn-save { background: var(--indigo); color: white; }
        .user-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .chart-section { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 16px; margin-bottom: 20px; }
        .chart-container { position: relative; height: 220px; width: 100%; }
        
        .section-actions { display: flex; justify-content: space-between; gap: 8px; margin-top: 12px; }
        .btn-sm { padding: 8px 12px; font-size: 12px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 20px; box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

    <div class="offline-banner" id="offlineBanner">⚡ Anda offline — data disimpan setempat</div>
    <div class="sync-status" id="syncStatus">○ tempatan</div>
    <div class="toast" id="toast"></div>

    <header class="header">
        <div class="header-inner">
            <div class="header-top">
                <div class="header-brand"><h1>MyExpense</h1></div>
                <button class="user-chip" id="userBtn">
                    <span id="userAvatar">👤</span> <span id="userLabel">Login</span>
                </button>
            </div>
            <div class="month-selector">
                <button id="prevMonth">‹</button>
                <span id="monthLabel">--</span>
                <button id="nextMonth">›</button>
            </div>
            <div class="total-section">
                <div class="amount" id="grandTotal">RM 0.00</div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="chart-section" id="chartSection" style="display:none;">
            <h4 style="margin-bottom:12px; font-size:13px; color:var(--text-secondary);">📊 Pecahan Belanja Bulan Ini</h4>
            <div class="chart-container"><canvas id="expenseChart"></canvas></div>
        </div>

        <div class="chart-section" id="compareChartSection" style="display:none;">
            <h4 style="margin-bottom:12px; font-size:13px; color:var(--text-secondary);">📈 Trend Perbandingan Bulanan</h4>
            <div class="chart-container" style="height:200px;"><canvas id="compareChart"></canvas></div>
        </div>

        <div class="category-grid" id="categoryGrid"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <h3>📋 Transaksi Bulan Ini</h3>
            <span id="entryCount" style="font-size:13px; color:var(--text-secondary);">0 rekod</span>
        </div>

        <div class="entry-list" id="entryList"></div>

        <div class="section-actions">
            <button class="btn-sm" id="forceSyncBtn" style="background:var(--indigo); color:white; font-weight:600; border:none;">🔄 Tarik Semua Data Supabase</button>
            <button class="btn-sm" id="resetBtn" style="color:var(--red);">Reset Bulan Ini</button>
        </div>
    </main>

    <button class="fab" id="fabBtn">+</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Tambah Perbelanjaan</h2>
            <div class="form-group" style="margin-top:15px;">
                <label>Kategori</label>
                <select id="catSelect">
                    <option value="bil">Bil & Utiliti</option>
                    <option value="pendidikan">Yuran Pendidikan</option>
                    <option value="petrol">Petrol</option>
                    <option value="dapur">Belanja Dapur</option>
                    <option value="pinjaman">Pinjaman</option>
                    <option value="lain">Lain-lain</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah (RM)</label>
                <input type="number" id="amountInput" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Tarikh</label>
                <input type="date" id="dateInput" required>
            </div>
            <div class="form-group">
                <label>Catatan (opsional)</label>
                <input type="text" id="noteInput" placeholder="Contoh: Bil elektrik">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelBtn">Batal</button>
                <button class="btn-save" id="saveBtn">Simpan</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="authOverlay">
        <div class="modal">
            <h2>Login Pengguna</h2>
            <div class="form-group" style="margin-top:15px;">
                <label>Nama Pengguna</label>
                <input type="text" id="loginNameInput" placeholder="Contoh: ashraf">
            </div>
            <div class="form-group">
                <label>PIN (4 Digit)</label>
                <input type="password" id="loginPinInput" maxlength="4" placeholder="0000">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="authCancelBtn">Batal</button>
                <button class="btn-save" id="authSaveBtn">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tgctymbcdhvnyvncryqx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnY3R5bWJjZGh2bnl2bmNyeXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjMyMTIsImV4cCI6MjA5ODEzOTIxMn0.5X615_6NgGpHP5Jr849ZeVBWPamABB5YxMoiqkjkTm4";
        
        let supabaseClient = null;
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(err) { console.error(err); }

        const CATEGORIES = {
            bil: { name: 'Bil & Utiliti', color: '#ef4444' },     
            pendidikan: { name: 'Yuran Pendidikan', color: '#3b82f6' }, 
            petrol: { name: 'Petrol', color: '#f59e0b' },         
            dapur: { name: 'Belanja Dapur', color: '#10b981' },     
            pinjaman: { name: 'Pinjaman', color: '#8b5cf6' },     
            lain: { name: 'Lain-lain', color: '#ec4899' }         
        };

        let expenses = JSON.parse(localStorage.getItem('myexpense_data')) || [];
        let currentDate = new Date();
        let myChart = null;
        let compareChart = null;

        const monthLabel = document.getElementById('monthLabel');
        const grandTotalEl = document.getElementById('grandTotal');
        const categoryGrid = document.getElementById('categoryGrid');
        const entryList = document.getElementById('entryList');
        const entryCountEl = document.getElementById('entryCount');
        const MONTHS_MS = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];
        
        function autoDetectDataMonth() {
            if (expenses.length > 0) {
                const validDates = expenses.map(e => new Date(e.date)).filter(d => !isNaN(d.getTime()));
                if (validDates.length > 0) {
                    const latest = new Date(Math.max(...validDates));
                    currentDate = new Date(latest.getFullYear(), latest.getMonth(), 1);
                }
            }
        }

        function updateMonthDisplay() {
            monthLabel.innerText = `${MONTHS_MS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            renderApp();
        }

        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); updateMonthDisplay(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); updateMonthDisplay(); });

        function renderApp() {
            const targetMonth = currentDate.getMonth(); 
            const targetYear = currentDate.getFullYear();

            const filtered = expenses.filter(exp => {
                if (!exp.date) return false;
                if (typeof exp.date === 'string' && exp.date.includes('-')) {
                    const parts = exp.date.split('-');
                    if (parts.length >= 2) {
                        return parseInt(parts[0], 10) === targetYear && (parseInt(parts[1], 10) - 1) === targetMonth;
                    }
                }
                const d = new Date(exp.date);
                return !isNaN(d.getTime()) && d.getFullYear() === targetYear && d.getMonth() === targetMonth;
            });

            let totalSum = filtered.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            grandTotalEl.innerText = `RM ${totalSum.toFixed(2)}`;
            entryCountEl.innerText = `${filtered.length} rekod`;

            let catTotals = { bil: 0, pendidikan: 0, petrol: 0, dapur: 0, pinjaman: 0, lain: 0 };
            filtered.forEach(item => { if (catTotals[item.category] !== undefined) catTotals[item.category] += parseFloat(item.amount); });

            categoryGrid.innerHTML = '';
            Object.keys(CATEGORIES).forEach(key => {
                const total = catTotals[key];
                const pct = totalSum > 0 ? (total / totalSum) * 100 : 0;
                categoryGrid.innerHTML += `
                    <div class="cat-card">
                        <div class="cat-top">
                            <span class="cat-name">${CATEGORIES[key].name}</span>
                            <span class="cat-total">RM ${total.toFixed(2)}</span>
                        </div>
                        <div class="cat-bar"><div class="cat-bar-fill" style="width: ${pct}%; background: ${CATEGORIES[key].color};"></div></div>
                    </div>
                `;
            });

            entryList.innerHTML = '';
            if (filtered.length === 0) {
                entryList.innerHTML = `<div class="entry-empty">📭<br>Tiada rekod data dijumpai pada bulan ini.</div>`;
            } else {
                filtered.forEach(item => {
                    entryList.innerHTML += `
                        <div class="entry-item">
                            <div class="e-info">
                                <span class="e-cat" style="color:${CATEGORIES[item.category].color}">${CATEGORIES[item.category].name}</span>
                                <span class="e-note">${item.note || '-'}</span>
                                <span class="e-date">${item.date}</span>
                            </div>
                            <div class="e-right">
                                <span class="e-amount">RM ${parseFloat(item.amount).toFixed(2)}</span>
                                <button class="e-delete" onclick="deleteExpense('${item.id}')">✕</button>
                            </div>
                        </div>
                    `;
                });
            }
            
            renderChart(catTotals);
            renderCompareChart(targetYear);
        }

        document.getElementById('fabBtn').addEventListener('click', () => {
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalOverlay').classList.add('open');
        });
        document.getElementById('cancelBtn').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const category = document.getElementById('catSelect').value;
            const amount = document.getElementById('amountInput').value;
            const date = document.getElementById('dateInput').value; 
            const note = document.getElementById('noteInput').value.trim();

            if (!amount || amount <= 0 || !date) { showToast('Sila isi maklumat sah!', 'error'); return; }

            const newRecord = {
                id: 'id_' + Date.now(),
                category: category,
                amount: parseFloat(amount),
                date: date,
                note: note,
                user_key: localStorage.getItem('myexpense_user_key') || 'tempatan',
                username_raw: localStorage.getItem('myexpense_user_name') || 'tempatan'
            };

            expenses.unshift(newRecord);
            localStorage.setItem('myexpense_data', JSON.stringify(expenses));
            document.getElementById('modalOverlay').classList.remove('open');
            document.getElementById('amountInput').value = '';
            document.getElementById('noteInput').value = '';

            showToast('Rekod disimpan setempat!');
            const parts = date.split('-');
            currentDate = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, 1);
            updateMonthDisplay();
            await syncInsertToSupabase(newRecord);
        });

        window.deleteExpense = async function(id) {
            if (confirm('Padam rekod ini?')) {
                expenses = expenses.filter(exp => exp.id !== id);
                localStorage.setItem('myexpense_data', JSON.stringify(expenses));
                renderApp();
                await syncDeleteFromSupabase(id);
            }
        };

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Reset keseluruhan data paparan bulan ini?')) {
                expenses = [];
                localStorage.setItem('myexpense_data', JSON.stringify(expenses));
                renderApp();
            }
        });

        function renderChart(catTotals) {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const catKeys = Object.keys(CATEGORIES);
            const dataValues = catKeys.map(key => catTotals[key] || 0);
            const colors = catKeys.map(key => CATEGORIES[key].color);
            const labels = catKeys.map(key => CATEGORIES[key].name);
            
            if (!dataValues.some(v => v > 0)) { 
                document.getElementById('chartSection').style.display = 'none'; 
                return; 
            }
            
            document.getElementById('chartSection').style.display = 'block';
            
            if (myChart) { 
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = dataValues; 
                myChart.data.datasets[0].backgroundColor = colors;
                myChart.update(); 
            } else {
                myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{ 
                            data: dataValues, 
                            backgroundColor: colors,
                            borderWidth: 2,
                            borderColor: 'var(--surface)'
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { 
                                display: true, 
                                position: 'bottom',
                                labels: { boxWidth: 12, padding: 10, font: { size: 11, family: 'Segoe UI' }, color: 'var(--text-secondary)' }
                            }, 
                            tooltip: { 
                                enabled: true,
                                callbacks: {
                                    label: function(context) {
                                        let value = context.raw || 0;
                                        return ` ${context.label}: RM ${value.toFixed(2)}`;
                                    }
                                }
                            } 
                        },
                        cutout: '65%'
                    }
                });
            }
        }

        function renderCompareChart(targetYear) {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('compareChart').getContext('2d');
            let monthlyTotals = new Array(12).fill(0);
            expenses.forEach(exp => {
                if (!exp.date) return;
                let itemMonth = -1, itemYear = -1;
                if (typeof exp.date === 'string' && exp.date.includes('-')) {
                    const parts = exp.date.split('-');
                    if (parts.length >= 2) { itemYear = parseInt(parts[0], 10); itemMonth = parseInt(parts[1], 10) - 1; }
                } else {
                    const d = new Date(exp.date);
                    if (!isNaN(d.getTime())) { itemYear = d.getFullYear(); itemMonth = d.getMonth(); }
                }
                if (itemYear === targetYear && itemMonth >= 0 && itemMonth < 12) { monthlyTotals[itemMonth] += parseFloat(exp.amount); }
            });

            if (!monthlyTotals.some(v => v > 0)) { document.getElementById('compareChartSection').style.display = 'none'; return; }
            document.getElementById('compareChartSection').style.display = 'block';
            const shortMonths = ['Jan', 'Feb', 'Mac', 'Apr', 'Mei', 'Jun', 'Jul', 'Ogos', 'Sep', 'Okt', 'Nov', 'Dis'];

            if (compareChart) {
                compareChart.data.datasets[0].data = monthlyTotals;
                compareChart.options.plugins.title.text = `Tahun ${targetYear}`;
                compareChart.update();
            } else {
                compareChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: shortMonths,
                        datasets: [{ label: 'Jumlah Belanja (RM)', data: monthlyTotals, backgroundColor: '#6366f1', borderRadius: 6, borderSkipped: false }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, title: { display: true, text: `Tahun ${targetYear}`, font: { size: 11, family: 'Segoe UI' }, color: 'var(--text-secondary)' } },
                        scales: {
                            y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 }, color: 'var(--text-muted)' } },
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: 'var(--text-muted)' } }
                        }
                    }
                });
            }
        }

        const authOverlay = document.getElementById('authOverlay');
        document.getElementById('userBtn').addEventListener('click', () => authOverlay.classList.add('open'));
        document.getElementById('authCancelBtn').addEventListener('click', () => authOverlay.classList.remove('open'));
        document.getElementById('authSaveBtn').addEventListener('click', () => {
            const username = document.getElementById('loginNameInput').value.trim().toLowerCase();
            const pin = document.getElementById('loginPinInput').value.trim();
            if (!username || pin.length !== 4) { showToast('PIN mestilah 4 digit!', 'error'); return; }
            localStorage.setItem('myexpense_user_name', username);
            localStorage.setItem('myexpense_user_key', btoa(`${username}:${pin}`));
            authOverlay.classList.remove('open');
            checkLoginStatus();
        });

        function checkLoginStatus() {
            const savedName = localStorage.getItem('myexpense_user_name');
            if (savedName) {
                document.getElementById('userLabel').innerText = savedName.toUpperCase();
                document.getElementById('userAvatar').innerText = savedName.charAt(0).toUpperCase();
                fetchFromSupabaseNoFilter();
            }
        }

        async function fetchFromSupabaseNoFilter() {
            if (!supabaseClient) { updateSyncStatus('error', '⚠ Offline'); return; }
            updateSyncStatus('syncing', '↻ Membaca data...');
            try {
                const { data, error } = await supabaseClient.from('expenses').select('*');
                if (error) throw error;
                if (data && data.length > 0) {
                    let localMap = new Map(expenses.map(obj => [obj.id, obj]));
                    data.forEach(item => { if(item.id) localMap.set(item.id, item); });
                    expenses = Array.from(localMap.values());
                    localStorage.setItem('myexpense_data', JSON.stringify(expenses));
                    showToast(`Berjaya menarik masuk ${data.length} rekod dari awan!`, 'success');
                } else { showToast('Pangkalan data Supabase anda kosong.'); }
                autoDetectDataMonth(); updateMonthDisplay(); updateSyncStatus('synced', '✓ Berjaya');
            } catch (err) { console.error(err); updateSyncStatus('error', '⚠ Ralat Synchronize'); }
        }

        document.getElementById('forceSyncBtn').addEventListener('click', () => { fetchFromSupabaseNoFilter(); });
        async function syncInsertToSupabase(record) { if (!supabaseClient) return; try { await supabaseClient.from('expenses').insert([record]); } catch (e) { console.error(e); } }
        async function syncDeleteFromSupabase(id) { if (!supabaseClient) return; try { await supabaseClient.from('expenses').delete().eq('id', id); } catch (e) {} }
        function updateSyncStatus(status, text) { const el = document.getElementById('syncStatus'); if(el) { el.className = `sync-status ${status}`; el.innerText = text; } }
        function showToast(message, type = 'success') { const t = document.getElementById('toast'); if(t) { t.innerText = message; t.className = `toast show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); } }

        window.addEventListener('load', () => {
            autoDetectDataMonth();
            updateMonthDisplay();
            checkLoginStatus();
        });

        // RECOLOR & DAFTAR SERVICE WORKER UNTUK PEMASANGAN PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA Service Worker berjaya didaftarkan!', reg.scope))
                .catch(err => console.log('Pendaftaran Service Worker Gagal:', err));
            });
        }
    </script>
</body>
</html>
